[common]
; ===========================================================
; 基础通用设置
; ===========================================================
api_mode=false
exclude_remarks=(?i)到期|重置|剩余|流量|官网|产品|订阅
include_remarks=
rename_node=!!GROUP!!

; ===========================================================
; 策略组定义
; ===========================================================

; 基础节点池
custom_proxy_group=♻️ 手动切换`select`.*
custom_proxy_group=🏠 家宽代理`select`.*

; 功能分组
custom_proxy_group=🎵 TikTok`select`[]♻️ 手动切换`[]DIRECT`[]🏠 家宽代理`.*
custom_proxy_group=🤖 AI 服务`select`[]♻️ 手动切换`[]DIRECT`[]🏠 家宽代理`.*
custom_proxy_group=🔍 Google`select`[]♻️ 手动切换`[]DIRECT`[]🏠 家宽代理`.*
custom_proxy_group=🇺🇳 国外网站`select`[]♻️ 手动切换`[]DIRECT`[]🏠 家宽代理`.*
custom_proxy_group=🇨🇳 国内网站`select`[]DIRECT`[]♻️ 手动切换`[]🏠 家宽代理`.*

; 兜底
custom_proxy_group=🐟 规则之外`select`[]DIRECT`[]♻️ 手动切换`[]🏠 家宽代理`.*

; ===========================================================
; 规则集关联
; ===========================================================

ruleset=🎵 TikTok,https://raw.githubusercontent.com/teekalpha/MiRules/main/rules/TikTok.list
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=🎵 TikTok,[]GEOIP,tiktok,no-resolve
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/teekalpha/MiRules/main/rules/AI.list
ruleset=🔍 Google,https://raw.githubusercontent.com/teekalpha/MiRules/main/rules/Google.list
ruleset=🇺🇳 国外网站,https://raw.githubusercontent.com/teekalpha/MiRules/main/rules/Media.list
ruleset=🇺🇳 国外网站,https://raw.githubusercontent.com/teekalpha/MiRules/main/rules/Proxy.list
ruleset=🇨🇳 国内网站,https://raw.githubusercontent.com/teekalpha/MiRules/main/rules/Direct.list
ruleset=DIRECT,[]GEOIP,CN
ruleset=🐟 规则之外,[]FINAL
